name: Blog feed
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://fabiodiashauck.com.br/blog/rss.xml"
          max_post_count: 5
          template: "- [$title]($url) <sub>· $date</sub>"
          commit_message: "docs(profile): refresh blog feed"
          committer_username: "Fabio Dias Hauck"
          committer_email: "fabiohauck92@gmail.com"
